name: Bug report
description: Report a problem with Selfsame
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run and what went wrong?
      placeholder: "probe verify --base main --modules mypkg -- pytest -q ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Selfsame version
      placeholder: "selfsame 0.1.1 (pip show selfsame)"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version & OS
      placeholder: "Python 3.12 on macOS 14"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / traceback
      render: shell

name: Feature request
description: Suggest an idea for Selfsame
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Selfsame doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: soundness
    attributes:
      label: Soundness considerations
      description: >
        Could this introduce a false "equivalent"/"divergent" verdict? How would
        the engine stay sound (refuse when unsure)?

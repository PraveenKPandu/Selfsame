name: release

# Publishes the package to PyPI when a version tag (vX.Y.Z) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in GitHub.
# One-time setup is required on PyPI; see RELEASING.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # build-only dry run (does not publish)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pkg=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag="${GITHUB_REF_NAME#v}"
          echo "pyproject=$pkg  tag=$tag"
          test "$pkg" = "$tag" || { echo "::error::tag $tag != pyproject version $pkg"; exit 1; }

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a tag push (workflow_dispatch stays a dry run).
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi          # must match the Trusted Publisher config on PyPI
    permissions:
      id-token: write          # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # don't fail if this version is already on PyPI

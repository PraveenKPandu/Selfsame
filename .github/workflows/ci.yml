name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    name: tests (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        # The suite shells out to `pytest` as a capture command and exercises the
        # pytest plugin; the package itself has no runtime dependencies.
        run: pip install pytest
      - name: Run test suite
        working-directory: packages/python
        env:
          PYTHONHASHSEED: "0"
        run: python -m unittest discover -s tests -v

  test-node:
    name: tests (node${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install deps (es-module-lexer; ESM tests need Node >= 20.6)
        working-directory: packages/node
        run: npm install --no-audit --no-fund
      - name: Run test suite
        working-directory: packages/node
        run: node --test test/*.test.js

  test-java:
    name: tests (java${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17", "21"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Compile + run tests (dependency-free runner)
        working-directory: packages/java
        run: |
          javac -d out src/main/java/dev/selfsame/*.java src/test/java/dev/selfsame/*.java
          java -cp out dev.selfsame.TestMain

  # The agent-based capture -> replay pipeline (needs ByteBuddy + the shaded jar,
  # so it builds with Maven, unlike the pure-JDK conformance job above).
  test-java-agent:
    name: java agent e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build shaded jar + run capture/replay e2e
        working-directory: packages/java
        run: |
          mvn -B -ntp -DskipTests package
          bash e2e.sh

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install "ruff>=0.6"
      - run: ruff check probe tests units
        working-directory: packages/python

  # Cross-language protocol conformance (SPEC/conformance). Each implemented
  # language runs the same language-neutral vectors through its comparator and
  # soundness gate. Add a matrix entry + step as new languages land.
  conformance:
    name: conformance (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [python, node, java]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        if: matrix.lang == 'python'
        with:
          python-version: "3.x"
      - name: Python conformance
        if: matrix.lang == 'python'
        working-directory: packages/python
        env:
          PYTHONHASHSEED: "0"
        run: python -m unittest tests.test_conformance -v
      - uses: actions/setup-node@v6
        if: matrix.lang == 'node'
        with:
          node-version: "20"
      - name: Node conformance
        if: matrix.lang == 'node'
        working-directory: packages/node
        run: node --test test/conformance.test.js
      - uses: actions/setup-java@v4
        if: matrix.lang == 'java'
        with:
          distribution: temurin
          java-version: "17"
      - name: Java conformance
        if: matrix.lang == 'java'
        working-directory: packages/java
        run: |
          javac -d out src/main/java/dev/selfsame/*.java src/test/java/dev/selfsame/*.java
          java -cp out dev.selfsame.TestMain

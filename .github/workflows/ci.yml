name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    name: tests (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite
        env:
          PYTHONHASHSEED: "0"
        run: python -m unittest discover -s tests -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install "ruff>=0.6"
      - run: ruff check probe tests units
